    - schema: jaroomaji              # 日语
    - schema: double_pinyin_ziguang  # 紫光双拼
    - schema: rime_etch              # 刻蚀笔画

  # 菜单
  menu: 
    page_size: 8  # 候选词个数

  # 方案选单相关
  switcher/caption: 〔方案選單〕
  switcher/hotkeys:
    - F4
    - "Control+F8"
    - "Control+grave"
    - "Control+Shift+grave"
  
