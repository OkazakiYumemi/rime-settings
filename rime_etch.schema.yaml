    # 二字词，允许 (6, 6) 简拼
    - derive/^([hspnz])[hspnz]*'([hspnz])[hspnz]*$/$1'$2/
    - derive/^([hspnz]{2})[hspnz]*'([hspnz])[hspnz]*$/$1'$2/
