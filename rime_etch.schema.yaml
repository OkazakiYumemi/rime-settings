    - derive/^([hspnz]{6})[hspnz]*'([hspnz]{5})[hspnz]*'([hspnz])[hspnz]*'([hspnz])[hspnz]*'.+$/$1'$2'$3'$4'/

    - derive/^([hspnz])[hspnz]*'([hspnz]{6})[hspnz]*'([hspnz])[hspnz]*'([hspnz])[hspnz]*'.+$/$1'$2'$3'$4'/
    - derive/^([hspnz]{2})[hspnz]*'([hspnz]{6})[hspnz]*'([hspnz])[hspnz]*'([hspnz])[hspnz]*'.+$/$1'$2'$3'$4'/
    - derive/^([hspnz]{3})[hspnz]*'([hspnz]{6})[hspnz]*'([hspnz])[hspnz]*'([hspnz])[hspnz]*'.+$/$1'$2'$3'$4'/
    - derive/^([hspnz]{4})[hspnz]*'([hspnz]{6})[hspnz]*'([hspnz])[hspnz]*'([hspnz])[hspnz]*'.+$/$1'$2'$3'$4'/
    - derive/^([hspnz]{5})[hspnz]*'([hspnz]{6})[hspnz]*'([hspnz])[hspnz]*'([hspnz])[hspnz]*'.+$/$1'$2'$3'$4'/
    - derive/^([hspnz]{6})[hspnz]*'([hspnz]{6})[hspnz]*'([hspnz])[hspnz]*'([hspnz])[hspnz]*'.+$/$1'$2'$3'$4'/
# menu:
