# Rime schema settings
# encoding: utf-8

schema:
  schema_id: rime_etch
  name: "刻蚀笔画"
  version: "2026-04-11"
  author:
    # - 四季的風
    # - 雪齋
    # - Kunki Chou
    # - 宋天
    # 旧的作者信息，仅保留注释
    - Okazaki Yumemi
  description: |
    刻蚀笔画
    h, s, p, n, z 代表橫、豎、撇、捺、折
    https://github.com/OkazakiYumemi/rime-etch
  # dependencies:
  #   - luna_pinyin

switches:
  - name: ascii_mode
    states: [ 中, Ａ ]
  - name: ascii_punct  # 中英标点
    states: [ ¥, $ ]
  - name: full_shape
    states: [ 半角, 全角 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz'"
  delimiter: ""
  algebra:
    - derive/^([hspnz])[hspnz]+$/$1/      # 单字首 1 笔画简拼
    - derive/^([hspnz]{2})[hspnz]+$/$1/   # 单字首 2 笔画简拼
    - derive/^([hspnz]{3})[hspnz]+$/$1/   # 单字首 3 笔画简拼
    - derive/^([hspnz]{4})[hspnz]+$/$1/   # 单字首 4 笔画简拼
    - derive/^([hspnz]{5})[hspnz]+$/$1/   # 单字首 5 笔画简拼
