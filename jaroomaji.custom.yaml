patch:
  # # # # # # # # # # # # # # # # # # # #
  # 機能切り替えの設定
  # # # # # # # # # # # # # # # # # # # #
  # switches:
  #   - name: ascii_mode
  #     states: [ あ, A ]
  #     reset: 1  # デフォルトで英数モード
  #   - name: full_shape
  #     states: [ 半角記号, 全角記号 ]
  #     reset: 0  # デフォルトで半角記号モード
  switches/@0/reset: ""
  switches/@1/reset: ""


  # # # # # # # # # # # # # # # # # # # #
  # キーバインドの設定
  # # # # # # # # # # # # # # # # # # # #
  key_binder:
    import_preset: default
    bindings:
      # - { when: has_menu, accept: minus, send: minus }  # 「ー」入力用
      - { when: has_menu, accept: grave, send: minus }  # 「ー」入力用
      - { when: has_menu, accept: Return, send: Shift+Return }  # Enterで変換しないで直接確定
      - { when: has_menu, accept: Shift+Return, send: Return }  # Shift + Enterで英字確定